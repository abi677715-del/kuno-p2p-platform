services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: p2p_exchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/p2p_exchange
      JWT_SECRET: dev-only-change-me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev-only-change-me-too
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
      PLATFORM_DEPOSIT_ADDRESS: TEgqauvdKFjcXDGfywsH1oWyQKegQbN4pA
      PLATFORM_FEE_PERCENT: "2"
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    command: sh -c "npx prisma db push && node dist/main.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
